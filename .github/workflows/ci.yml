name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Notify Telegram on success
        if: success() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          import urllib.parse
          import urllib.request

          message = (
              "CI passed\n"
              f"Repo: {os.environ['GITHUB_REPOSITORY']}\n"
              f"Branch: {os.environ['GITHUB_REF_NAME']}\n"
              f"Commit: {os.environ['GITHUB_SHA'][:7]}\n"
              f"Run: {os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          )
          data = urllib.parse.urlencode({
              "chat_id": os.environ["TELEGRAM_CHAT_ID"],
              "text": message,
          }).encode()
          urllib.request.urlopen(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage",
              data=data,
          ).read()
          PY

      - name: Notify Telegram on failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          import urllib.parse
          import urllib.request

          message = (
              "CI failed\n"
              f"Repo: {os.environ['GITHUB_REPOSITORY']}\n"
              f"Branch: {os.environ['GITHUB_REF_NAME']}\n"
              f"Commit: {os.environ['GITHUB_SHA'][:7]}\n"
              f"Run: {os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          )
          data = urllib.parse.urlencode({
              "chat_id": os.environ["TELEGRAM_CHAT_ID"],
              "text": message,
          }).encode()
          urllib.request.urlopen(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage",
              data=data,
          ).read()
          PY
